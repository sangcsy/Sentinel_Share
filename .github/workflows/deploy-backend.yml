name: Deploy Backend to EC2

on:
  push:
    branches: [master]
    paths:
      - 'sentinel-share-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:  # 수동 실행 허용

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: sentinelshare-backend

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Docker 이미지 빌드 & ECR 푸시 (한 번만)
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image output
        id: meta
        run: |
          echo "image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sentinel-share-backend
          file: ./sentinel-share-backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # ──────────────────────────────────────────────────────────────
  # 2. 취약 환경 배포 (No WAF, Public S3)
  #    SSM Send Command → 취약 EC2에서 docker pull + restart
  # ──────────────────────────────────────────────────────────────
  deploy-vulnerable:
    name: Deploy → Vulnerable (No WAF)
    needs: build
    runs-on: ubuntu-latest
    environment: vulnerable

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ needs.build.outputs.ecr-registry }}
          INSTANCE_ID: ${{ secrets.VULN_EC2_INSTANCE_ID }}
        run: |
          IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          # SSM에 전달할 명령어 목록을 jq로 안전하게 JSON 직렬화
          COMMANDS=$(jq -n \
            --arg registry "$ECR_REGISTRY" \
            --arg region "${{ env.AWS_REGION }}" \
            --arg image "$IMAGE" \
            '[
              "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
              "docker pull \($image)",
              "docker stop sentinelshare-backend || true",
              "docker rm sentinelshare-backend || true",
              "docker run -d --name sentinelshare-backend --env-file /opt/app/.env --network host --restart unless-stopped \($image)"
            ]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":${COMMANDS}}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # 명령 완료까지 대기 (기본 타임아웃 600초)
          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}"

          # 최종 실행 결과 확인
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StatusDetails" \
            --output text)
          echo "Deployment status: ${STATUS}"
          [ "${STATUS}" = "Success" ] || exit 1

  # ──────────────────────────────────────────────────────────────
  # 3. 보안 환경 배포 (CloudFront + WAF + Private S3)
  #    SSM Send Command → 보안 EC2에서 docker pull + restart
  # ──────────────────────────────────────────────────────────────
  deploy-secure:
    name: Deploy → Secure (WAF + CloudFront)
    needs: build
    runs-on: ubuntu-latest
    environment: secure

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        env:
          ECR_REGISTRY: ${{ needs.build.outputs.ecr-registry }}
          INSTANCE_ID: ${{ secrets.SECURE_EC2_INSTANCE_ID }}
        run: |
          IMAGE="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          COMMANDS=$(jq -n \
            --arg registry "$ECR_REGISTRY" \
            --arg region "${{ env.AWS_REGION }}" \
            --arg image "$IMAGE" \
            '[
              "aws ecr get-login-password --region \($region) | docker login --username AWS --password-stdin \($registry)",
              "docker pull \($image)",
              "docker stop sentinelshare-backend || true",
              "docker rm sentinelshare-backend || true",
              "docker run -d --name sentinelshare-backend --env-file /opt/app/.env --network host --restart unless-stopped \($image)"
            ]')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":${COMMANDS}}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          aws ssm wait command-executed \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${INSTANCE_ID}" \
            --query "StatusDetails" \
            --output text)
          echo "Deployment status: ${STATUS}"
          [ "${STATUS}" = "Success" ] || exit 1
