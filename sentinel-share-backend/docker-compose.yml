services:
  postgres:
    image: postgres:17.9-alpine
    container_name: ss-postgres
    environment:
      POSTGRES_DB: sentinelshare
      POSTGRES_USER: sentinelshare_user
      POSTGRES_PASSWORD: localpassword
    ports:
      - '5432:5432'
    volumes:
      - ss-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinelshare_user -d sentinelshare']
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: ss-localstack
    ports:
      - '4566:4566'
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-northeast-2
      EAGER_SERVICE_LOADING: 1
    volumes:
      - ss-localstack-data:/var/lib/localstack
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health | grep -qE "\"s3\": \"(available|running)\""']
      interval: 5s
      timeout: 5s
      retries: 20

  # ─── Attack Dashboard (선택 사항) ────────────────────────────
  # 호스트에서 직접 실행할 경우: cd ../attack-dashboard && npm run dev
  # Docker로 실행할 경우 아래 주석 해제
  #
  # attack-dashboard:
  #   build:
  #     context: ../attack-dashboard
  #     dockerfile: Dockerfile.dev
  #   container_name: ss-attack-dashboard
  #   ports:
  #     - '3002:3002'
  #   environment:
  #     VULNERABLE_API_URL: http://host.docker.internal:3000
  #     LOCALSTACK_URL: http://localstack:4566
  #     VULNERABLE_S3_BUCKET: sentinelshare-local
  #     AWS_API_URL: ''
  #   depends_on:
  #     localstack:
  #       condition: service_healthy

volumes:
  ss-postgres-data:
  ss-localstack-data:
